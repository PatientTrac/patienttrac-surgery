<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consent Library | PatientTracSurg</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --dark-bg: #0a1628;
            --darker-bg: #060e1c;
            --cyan: #00d4ff;
            --gold: #c9a96e;
            --purple: #a855f7;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f97316;
        }
        
        body {
            font-family: 'Rajdhani', 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            color: #ffffff;
            line-height: 1.6;
            padding-bottom: 100px;
        }
        
        /* Patient Banner */
        .patient-banner {
            background: linear-gradient(135deg, rgba(10, 22, 40, 0.95) 0%, rgba(6, 14, 28, 0.95) 100%);
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .patient-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--cyan);
            object-fit: cover;
        }
        
        .patient-info h2 {
            font-size: 1.75rem;
            color: var(--cyan);
            margin-bottom: 0.25rem;
        }
        
        .patient-meta {
            display: flex;
            gap: 2rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }
        
        /* Content */
        .content-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .section-card {
            background: linear-gradient(135deg, rgba(10, 22, 40, 0.8) 0%, rgba(6, 14, 28, 0.9) 100%);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }
        
        .section-card h3 {
            color: var(--cyan);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .section-card h3::before {
            content: "";
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--cyan) 0%, var(--purple) 100%);
            border-radius: 2px;
        }
        
        /* Template Grid */
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .template-card {
            background: rgba(6, 14, 28, 0.6);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .template-card:hover {
            border-color: var(--cyan);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        
        .template-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .template-card h4 {
            color: var(--cyan);
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
        }
        
        .template-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .template-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .version-badge {
            background: var(--green);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(6, 14, 28, 0.95);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .modal.active {
            display: block;
        }
        
        .modal-content {
            max-width: 900px;
            margin: 2rem auto;
            background: linear-gradient(135deg, rgba(10, 22, 40, 0.95) 0%, rgba(6, 14, 28, 0.98) 100%);
            border: 2px solid var(--cyan);
            border-radius: 16px;
            padding: 2rem;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .modal-header h3 {
            color: var(--cyan);
            font-size: 2rem;
        }
        
        .close-modal {
            background: transparent;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .close-modal:hover {
            color: var(--red);
        }
        
        .consent-content {
            background: rgba(6, 14, 28, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .consent-content h4 {
            color: var(--cyan);
            font-size: 1.3rem;
            margin: 1.5rem 0 1rem;
        }
        
        .consent-content ul {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }
        
        .consent-content li {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.5rem;
        }
        
        /* Signature Pad */
        .signature-section {
            margin-top: 2rem;
        }
        
        .signature-pad-container {
            border: 2px solid var(--cyan);
            border-radius: 8px;
            background: white;
            margin: 1rem 0;
            position: relative;
        }
        
        #signaturePad {
            width: 100%;
            height: 200px;
            cursor: crosshair;
        }
        
        .signature-controls {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--cyan) 0%, #0891b2 100%);
            color: white;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }
        
        .btn-secondary:hover {
            background: var(--gold);
            color: var(--darker-bg);
        }
        
        .btn-danger {
            background: var(--red);
            color: white;
        }
        
        /* Consent Checklist */
        .consent-checklist {
            margin: 1.5rem 0;
        }
        
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(6, 14, 28, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .checklist-item:hover {
            border-color: var(--cyan);
            background: rgba(0, 212, 255, 0.05);
        }
        
        .checklist-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        
        .checklist-item label {
            flex: 1;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* Action Bar */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(10, 22, 40, 0.98) 0%, rgba(6, 14, 28, 0.98) 100%);
            border-top: 2px solid rgba(0, 212, 255, 0.3);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 50;
        }
    </style>
</head>
<body>
    <!-- Patient Banner -->
    <div class="patient-banner">
        <img id="patientPhoto" src="https://via.placeholder.com/80" alt="Patient" class="patient-photo">
        <div class="patient-info">
            <h2 id="patientName">Loading...</h2>
            <div class="patient-meta">
                <span>🆔 MRN: <strong id="patientMRN">--</strong></span>
                <span>📅 DOB: <strong id="patientDOB">--</strong></span>
                <span>🏥 Procedure: <strong id="procedureName">--</strong></span>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="content-wrapper">
        <div class="section-card">
            <h3>Consent Template Library</h3>
            <div class="templates-grid" id="templatesGrid">
                <!-- Templates loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Consent Modal -->
    <div class="modal" id="consentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Consent Form</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>

            <div class="consent-content" id="consentContent">
                <!-- Content loaded dynamically -->
            </div>

            <div class="consent-checklist">
                <label class="checklist-item">
                    <input type="checkbox" id="risksExplained">
                    <span>I confirm that all risks have been explained to me</span>
                </label>
                <label class="checklist-item">
                    <input type="checkbox" id="benefitsExplained">
                    <span>I confirm that all benefits have been explained to me</span>
                </label>
                <label class="checklist-item">
                    <input type="checkbox" id="alternativesExplained">
                    <span>I confirm that alternative treatments have been explained to me</span>
                </label>
                <label class="checklist-item">
                    <input type="checkbox" id="questionsAnswered">
                    <span>I confirm that all my questions have been answered</span>
                </label>
            </div>

            <div class="signature-section">
                <h4 style="color: var(--cyan); margin-bottom: 1rem;">Patient Signature</h4>
                <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 1rem;">
                    Please sign below to indicate your consent:
                </p>
                <div class="signature-pad-container">
                    <canvas id="signaturePad"></canvas>
                </div>
                <div class="signature-controls">
                    <button class="btn btn-danger" onclick="clearSignature()">Clear Signature</button>
                    <button class="btn btn-primary" onclick="saveConsent()">Save Consent</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
        <a href="/dashboard.html" class="btn btn-secondary">← Back to Dashboard</a>
    </div>

    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://mskormozwekezjmtcylv.supabase.co';
        const SUPABASE_ANON_KEY = window.__PT_ANON_KEY || '';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const encounterId = urlParams.get('encounter_id');
        const patientId = urlParams.get('patient_id');
        const token = urlParams.get('token');

        let signaturePad;
        let currentTemplate = null;

        // Load patient data and templates
        window.addEventListener('DOMContentLoaded', async () => {
            if (!encounterId || !patientId || !token) {
                alert('Invalid access.');
                window.location.href = '/app.html';
                return;
            }

            // Load patient
            const { data: patient, error } = await supabase
                .from('surgery_encounter_view')
                .select('*')
                .eq('encounter_id', encounterId)
                .single();

            if (error || !patient) return;

            document.getElementById('patientName').textContent = `${patient.first_name} ${patient.last_name}`;
            document.getElementById('patientMRN').textContent = patient.mrn || '--';
            document.getElementById('patientDOB').textContent = patient.dob || '--';
            document.getElementById('procedureName').textContent = patient.encounter_type || 'Bariatric Surgery';
            
            if (patient.photo_url) {
                document.getElementById('patientPhoto').src = patient.photo_url;
            }

            // Load templates
            await loadTemplates();

            // Initialize signature pad
            const canvas = document.getElementById('signaturePad');
            signaturePad = new SignaturePad(canvas, {
                backgroundColor: 'rgb(255, 255, 255)',
                penColor: 'rgb(0, 0, 0)'
            });

            // Resize canvas
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        });

        // Load consent templates
        async function loadTemplates() {
            const { data: templates, error } = await supabase
                .from('informed_consent_templates')
                .select('*')
                .eq('org_id', '00000000-0000-0000-0000-000000000001')
                .eq('is_active', true)
                .order('template_name');

            if (error || !templates) return;

            const grid = document.getElementById('templatesGrid');
            grid.innerHTML = templates.map(t => `
                <div class="template-card" onclick="openConsentForm(${t.template_id})">
                    <div class="template-icon">${getTemplateIcon(t.procedure_category)}</div>
                    <h4>${t.template_name}</h4>
                    <p>${t.procedure_category === 'bariatric' ? 'Surgical' : 'Administrative'} Consent</p>
                    <div class="template-meta">
                        <span class="version-badge">v${t.version}</span>
                        ${t.legally_reviewed ? '<span>✓ Legal Review</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function getTemplateIcon(category) {
            const icons = {
                'bariatric': '🔪',
                'administrative': '📋',
                'breast': '💗',
                'facial': '👤'
            };
            return icons[category] || '📄';
        }

        // Open consent form
        async function openConsentForm(templateId) {
            const { data: template, error } = await supabase
                .from('informed_consent_templates')
                .select('*')
                .eq('template_id', templateId)
                .single();

            if (error || !template) return;

            currentTemplate = template;

            document.getElementById('modalTitle').textContent = template.template_name;
            
            let content = `
                <h4>${template.consent_title}</h4>
                <p>${template.introduction}</p>
                
                <h4>Procedure Description</h4>
                <p>${template.procedure_description}</p>
            `;

            if (template.risks_general && template.risks_general.length > 0 && template.risks_general[0] !== 'N/A') {
                content += `
                    <h4>General Risks</h4>
                    <ul>${template.risks_general.map(r => `<li>${r}</li>`).join('')}</ul>
                `;
            }

            if (template.risks_specific && template.risks_specific.length > 0 && template.risks_specific[0] !== 'N/A') {
                content += `
                    <h4>Specific Risks</h4>
                    <ul>${template.risks_specific.map(r => `<li>${r}</li>`).join('')}</ul>
                `;
            }

            if (template.risks_anesthesia && template.risks_anesthesia.length > 0 && template.risks_anesthesia[0] !== 'N/A') {
                content += `
                    <h4>Anesthesia Risks</h4>
                    <ul>${template.risks_anesthesia.map(r => `<li>${r}</li>`).join('')}</ul>
                `;
            }

            if (template.benefits && template.benefits.length > 0) {
                content += `
                    <h4>Benefits</h4>
                    <ul>${template.benefits.map(b => `<li>${b}</li>`).join('')}</ul>
                `;
            }

            if (template.alternatives && template.alternatives.length > 0 && template.alternatives[0] !== 'N/A') {
                content += `
                    <h4>Alternative Treatments</h4>
                    <ul>${template.alternatives.map(a => `<li>${a}</li>`).join('')}</ul>
                `;
            }

            if (template.financial_responsibility) {
                content += `<h4>Financial Responsibility</h4><p>${template.financial_responsibility}</p>`;
            }

            if (template.photography_consent) {
                content += `<h4>Photography Consent</h4><p>${template.photography_consent}</p>`;
            }

            if (template.no_guarantee_clause) {
                content += `<h4>No Guarantee</h4><p>${template.no_guarantee_clause}</p>`;
            }

            if (template.revision_policy) {
                content += `<h4>Revision Policy</h4><p>${template.revision_policy}</p>`;
            }

            document.getElementById('consentContent').innerHTML = content;
            document.getElementById('consentModal').classList.add('active');

            clearSignature();
        }

        function closeModal() {
            document.getElementById('consentModal').classList.remove('active');
            currentTemplate = null;
        }

        function clearSignature() {
            if (signaturePad) {
                signaturePad.clear();
            }
        }

        function resizeCanvas() {
            const canvas = document.getElementById('signaturePad');
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext('2d').scale(ratio, ratio);
            signaturePad.clear();
        }

        // Save consent
        async function saveConsent() {
            if (!currentTemplate) return;

            // Validate checkboxes
            if (!document.getElementById('risksExplained').checked ||
                !document.getElementById('benefitsExplained').checked ||
                !document.getElementById('alternativesExplained').checked ||
                !document.getElementById('questionsAnswered').checked) {
                alert('Please confirm all items in the checklist.');
                return;
            }

            // Validate signature
            if (signaturePad.isEmpty()) {
                alert('Please provide your signature.');
                return;
            }

            const signatureDataURL = signaturePad.toDataURL();

            const saveData = {
                org_id: '00000000-0000-0000-0000-000000000001',
                patient_id: parseInt(patientId),
                encounter_id: parseInt(encounterId),
                consent_template_id: currentTemplate.template_id,
                consent_type: currentTemplate.procedure_category,
                procedure_name: currentTemplate.template_name,
                form: currentTemplate.template_name,
                risks_explained: true,
                benefits_explained: true,
                alternatives_explained: true,
                questions_answered: true,
                patient_signature_url: signatureDataURL,
                consent_status: 'signed',
                accepted: true,
                rejected: false,
                patient_decision_time: new Date().toISOString(),
                insert_date: new Date().toISOString()
            };

            const { error } = await supabase
                .from('consent_forms')
                .insert(saveData);

            if (error) {
                console.error('Error:', error);
                alert('Error saving consent: ' + error.message);
            } else {
                alert('✅ Consent form signed successfully!');
                closeModal();
                window.location.href = '/dashboard.html?encounter_id=' + encounterId + '&patient_id=' + patientId + '&token=' + token;
            }
        }
    </script>
</body>
</html>
